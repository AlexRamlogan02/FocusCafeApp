openapi: 3.0.1

info:
  title: Focus Cafe App API
  description: API for PomoBrew
  contact:
    name: AlexRamlogan02
    email: aramlogan02@gmail.com
  version: 1.0.0

paths:
  /app-data:
    get:
      summary: Get app data
      operationId: getAppData
      x-endpoint-key: app_data_get
      x-lambda-dir: get-app-data
      x-handler: getAppData.handler
      x-auth: NONE
      x-timeout: 15
      x-memory-size: 256
      x-required-scopes: []
      x-dynamodb-actions: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hello from Focus Cafe App API!"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Bad Request"
    options:
      summary: CORS preflight request
      operationId: optionsAppData
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode":200}'
        responses:
          default:
            statusCode: '200'
            responseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
      responses:
        '200':
          description: Successful response
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
            Access-Control-Allow-Methods:
              schema:
                type: string
                example: "GET, OPTIONS"
            Access-Control-Allow-Headers:
              schema:
                type: string
                example: "Content-Type, Authorization"
