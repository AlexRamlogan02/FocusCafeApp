AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Focus Cafe API local SAM template

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256

Resources:
  GetAppDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: getAppData.handler
      CodeUri: lambda/get-app-data/
      Layers:
        - !Ref SharedUtilsLayer
        - !Ref SharedLoggerLayer
        - !Ref SharedDynamoLayer
      Environment:
        Variables:
          ENVIRONMENT: local
          SERVICE_NAME: app_data_get
          METRICS_NAMESPACE: focus-cafe-local
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          DYNAMODB_TABLE_NAME: focus-cafe-app-dev-main
      Events:
        GetAppData:
          Type: Api
          Properties:
            Path: /app-data
            Method: get

  SharedUtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: focus-cafe-local-shared-utils
      ContentUri: lambda_layer/shared_utils/
      CompatibleRuntimes:
        - nodejs20.x

  SharedLoggerLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: focus-cafe-local-shared-logger
      ContentUri: lambda_layer/shared_logger/
      CompatibleRuntimes:
        - nodejs20.x

  SharedDynamoLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: focus-cafe-local-shared-dynamo
      ContentUri: lambda_layer/shared_dynamo/
      CompatibleRuntimes:
        - nodejs20.x
